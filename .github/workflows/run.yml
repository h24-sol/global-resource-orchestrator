name: Global Orchestrator Run
on:
  workflow_dispatch: # This adds the "Play" button to run it manually
  schedule:
    - cron: '0 0 * * *' # This makes it run automatically every 24 hours

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Google AI SDK
        run: pip install google-generativeai
        
      - name: Execute Web 4.0 Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agents/brain.py
